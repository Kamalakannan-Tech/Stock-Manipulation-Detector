version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: stock_manipulation_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme_secure_password

  redis:
    image: redis:7-alpine
    container_name: stock_manipulation_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: stock_manipulation_backend
    restart: always
    ports:
      - "5000:5000"
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - MONGODB_URI=mongodb://admin:changeme_secure_password@mongodb:27017/
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

volumes:
  mongodb_data:
  redis_data:
